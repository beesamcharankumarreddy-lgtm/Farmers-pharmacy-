<!DOCTYPE html>
<html>
<head>
  <title>Farmers Pharmacy</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: green;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 15px;
    }

    .product {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    button {
      background: green;
      color: white;
      padding: 8px;
      border: none;
      margin-top: 5px;
      cursor: pointer;
    }

    input {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
    }

    .admin {
      background: #fff3cd;
      padding: 10px;
      margin: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>Farmers Pharmacy</h1>
</header>

<div class="container">

  <h2>Products</h2>
  <div id="products"></div>

</div>

<!-- ADMIN PANEL -->
<div class="admin">
  <h2>Admin Panel</h2>

  <input id="name" placeholder="Product Name">
  <input id="price" placeholder="Price">
  <input id="image" placeholder="Image URL">

  <button onclick="addProduct()">Add Product</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ➕ Add product
window.addProduct = async function () {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const image = document.getElementById("image").value;

  await addDoc(collection(db, "products"), {
    name,
    price,
    image
  });

  alert("Product Added");
  loadProducts();
};

// 📦 Load products
async function loadProducts() {
  const snap = await getDocs(collection(db, "products"));
  const container = document.getElementById("products");
  container.innerHTML = "";

  snap.forEach(doc => {
    const p = doc.data();

    container.innerHTML += `
      <div class="product">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <img src="${p.image}" width="200"/>
        <br/>
        <a href="tel:9876543210"><button>Call</button></a>
        <a href="https://wa.me/919876543210"><button>WhatsApp</button></a>
      </div>
    `;
  });
}

loadProducts();

</script>

</body>
</html>
